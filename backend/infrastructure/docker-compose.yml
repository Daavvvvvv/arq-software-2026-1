services:
  postgres:
    image: postgres:15-alpine
    container_name: concert_postgres
    environment:
      POSTGRES_DB: concert_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: concert_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    container_name: concert_localstack
    ports:
      - '4566:4566'
    environment:
      - SERVICES=sqs,sns
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
      - PERSISTENCE=0
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4566/_localstack/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  localstack_data:
